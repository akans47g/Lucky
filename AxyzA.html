<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Signal | SignalPro AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#14142a; --card:#1e1e38; --card2:#26264a; --card3:#2e2e58;
      --border:rgba(255,255,255,0.08);
      --gold:#f5c518; --gold2:#ffd740;
      --green:#00e676; --red:#ff4757;
      --purple:#ce93d8; --purple-d:#9c6fff;
      --orange:#ff9100; --white:#f4f4ff;
      --gray:#9090b8; --gray2:#4a4a78;
      --big-col:#00e676; --small-col:#ff4757;
      --nav-h:66px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg); color:var(--white);
      font-family:'Rajdhani','Noto Sans Devanagari',sans-serif;
      min-height:100vh; padding-bottom:calc(var(--nav-h)+10px);
      overflow-x:hidden;
    }
    body::after{
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:radial-gradient(circle,rgba(156,111,255,0.05) 1px,transparent 1px);
      background-size:28px 28px;
    }

    /* ── LOADING OVERLAY ── */
    #loadingOverlay{
      position:fixed; inset:0; z-index:900;
      background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    }
    #loadingOverlay.hidden{display:none}
    .loader-ring{
      width:50px; height:50px; border-radius:50%;
      border:3px solid rgba(245,197,24,0.15);
      border-top-color:var(--gold);
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-txt{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--gray);letter-spacing:2px}

    /* ── TOAST ── */
    #toast{
      position:fixed; top:18px; left:50%;
      transform:translateX(-50%) translateY(-8px);
      z-index:1000; padding:11px 22px; border-radius:12px;
      font-size:13px; font-weight:700; opacity:0; pointer-events:none;
      transition:opacity .3s,transform .3s; white-space:nowrap; max-width:90vw; text-align:center;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.hidden{display:none}
    #toast.success{background:rgba(0,230,118,.15);border:1px solid var(--green);color:var(--green)}
    #toast.warn{background:rgba(255,145,0,.15);border:1px solid var(--orange);color:var(--orange)}
    #toast.error{background:rgba(255,71,87,.15);border:1px solid var(--red);color:var(--red)}
    #toast.info{background:rgba(156,111,255,.15);border:1px solid var(--purple-d);color:var(--purple)}

    /* ── HEADER ── */
    header{
      position:sticky; top:0; z-index:200; height:60px;
      background:rgba(20,20,42,.96); backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(245,197,24,.3);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; box-shadow:0 4px 24px rgba(0,0,0,.4);
    }
    .hd-left{display:flex;align-items:center;gap:8px}
    .live-pill{
      display:flex; align-items:center; gap:5px;
      background:rgba(0,230,118,.12); border:1px solid rgba(0,230,118,.38);
      border-radius:20px; padding:3px 10px;
    }
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:lp 1.3s ease-in-out infinite}
    @keyframes lp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
    .live-text{font-size:10px;color:var(--green);font-weight:700;letter-spacing:1.5px}
    .hd-title{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(11px,2.8vw,15px); font-weight:900; letter-spacing:1px;
      background:linear-gradient(90deg,var(--gold),var(--gold2),var(--orange),var(--gold));
      background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 3s linear infinite;
    }
    @keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
    .hd-logo{
      width:40px; height:40px; border-radius:50%;
      border:2px solid var(--gold); box-shadow:0 0 12px rgba(245,197,24,.4);
      overflow:hidden; background:var(--card2);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .hd-logo img{width:100%;height:100%;object-fit:cover;display:block}
    .hd-logo .lf{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--gold);display:none}

    /* ── MAIN ── */
    main{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px 14px 10px}

    /* ── SUBSCRIPTION STATUS ── */
    .sub-status{
      border-radius:18px; padding:14px 16px; margin-bottom:14px;
      position:relative; overflow:hidden;
      border:1px solid rgba(0,230,118,.3);
      background:linear-gradient(135deg,#0f1a0f,#0d2010);
      box-shadow:0 6px 24px rgba(0,230,118,.1);
      animation:rv .5s cubic-bezier(.22,.68,0,1.2) both;
    }
    .sub-status::before{
      content:''; position:absolute; inset:0; pointer-events:none;
      background:radial-gradient(ellipse at 50% 0%,rgba(0,230,118,.1) 0%,transparent 65%);
    }
    .ss-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative}
    .ss-badge{
      display:flex; align-items:center; gap:5px;
      background:rgba(0,230,118,.15); border:1px solid rgba(0,230,118,.4);
      border-radius:20px; padding:3px 10px;
      font-size:10px; color:var(--green); font-weight:800; letter-spacing:1px;
    }
    .ss-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:lp 1.3s ease-in-out infinite}
    .ss-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--green);position:relative}
    .ss-countdown{display:flex;gap:6px;justify-content:center;position:relative}
    .ssc-box{
      background:rgba(0,0,0,.3); border:1px solid rgba(0,230,118,.2);
      border-radius:8px; padding:7px 6px; min-width:50px; text-align:center;
    }
    .ssc-num{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--green);line-height:1}
    .ssc-lbl{font-size:9px;color:var(--gray);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}

    /* ── PLATFORM URL SECTION ── */
    .platform-section{
      background:var(--card); border-radius:18px; border:1px solid var(--border);
      padding:16px; margin-bottom:14px;
      animation:rv .5s .08s cubic-bezier(.22,.68,0,1.2) both;
    }
    .ps-title{
      font-size:13px; font-weight:800; color:var(--white); margin-bottom:12px;
      display:flex; align-items:center; gap:8px;
    }
    .ps-hint{font-size:11px;color:var(--gray);margin-bottom:10px;line-height:1.55}
    .url-input-row{display:flex;gap:8px}
    .url-input{
      flex:1; background:var(--card2); border:1.5px solid var(--border);
      border-radius:12px; padding:11px 14px; color:var(--white);
      font-size:13px; font-family:'Rajdhani',sans-serif;
      outline:none; transition:border-color .2s;
    }
    .url-input:focus{border-color:rgba(156,111,255,.5);box-shadow:0 0 0 3px rgba(156,111,255,.08)}
    .url-input::placeholder{color:var(--gray2)}
    .url-submit-btn{
      background:linear-gradient(135deg,var(--purple-d),var(--gold));
      color:#000; border:none; border-radius:12px;
      padding:11px 18px; font-size:13px; font-weight:800;
      cursor:pointer; font-family:'Rajdhani',sans-serif; white-space:nowrap;
      transition:transform .15s;
    }
    .url-submit-btn:active{transform:scale(.97)}
    .url-saved{
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      background:rgba(0,230,118,.08); border:1px solid rgba(0,230,118,.2);
      border-radius:10px; padding:8px 12px; margin-top:8px;
    }
    .url-saved-text{font-size:11px;color:var(--green);font-weight:700;word-break:break-all}
    .url-change-btn{
      background:none; border:1px solid rgba(156,111,255,.3);
      border-radius:8px; padding:4px 10px;
      font-size:11px; color:var(--purple); font-weight:700;
      cursor:pointer; white-space:nowrap; flex-shrink:0;
      font-family:'Rajdhani',sans-serif;
    }

    /* ── SIGNAL BOX ── */
    #signalSection{display:none}
    #signalSection.visible{display:block;animation:rv .6s cubic-bezier(.22,.68,0,1.2) both}

    .signal-outer{
      border-radius:20px; padding:18px;
      margin-bottom:14px; position:relative; overflow:hidden;
      background:#1a2744;
      border:2px solid rgba(255,255,255,.1);
      box-shadow:0 12px 40px rgba(0,0,0,.5);
    }
    /* flash overlay on signal change */
    .signal-outer::after{
      content:''; position:absolute; inset:0; border-radius:20px;
      background:transparent; pointer-events:none;
      transition:background .15s;
    }
    .signal-outer.flash::after{background:rgba(255,255,255,.08)}

    /* Inner white signal card */
    .signal-inner{
      background:#fff; border-radius:10px;
      padding:22px 16px 18px; text-align:center;
      margin-bottom:16px; position:relative;
      box-shadow:0 4px 20px rgba(0,0,0,.3);
      border:2px solid rgba(0,0,0,.08);
    }

    .signal-word{
      font-family:'Orbitron',sans-serif; font-weight:900;
      font-size:clamp(48px,14vw,72px); line-height:1;
      -webkit-text-stroke:3px #000;
      letter-spacing:2px; margin-bottom:14px;
      transition:all .3s ease;
    }
    .signal-word.BIG  { color:var(--big-col);  -webkit-text-stroke:3px #006600; }
    .signal-word.SMALL{ color:#f5c518;          -webkit-text-stroke:3px #5a4000; }

    .signal-id{
      font-family:'Orbitron',sans-serif; font-weight:700;
      font-size:clamp(11px,3.5vw,15px); color:#111;
      letter-spacing:1px; word-break:break-all;
    }

    /* Outside the white card */
    .signal-percent{
      font-family:'Orbitron',sans-serif; font-weight:900;
      font-size:clamp(18px,5vw,24px); color:#fff;
      text-align:center; margin-bottom:14px;
      text-shadow:0 2px 12px rgba(0,0,0,.5);
    }
    .signal-percent span.pct-num{
      color:var(--gold);
      animation:num-glow 2s ease-in-out infinite alternate;
    }
    @keyframes num-glow{from{text-shadow:0 0 8px rgba(245,197,24,.3)}to{text-shadow:0 0 20px rgba(245,197,24,.8)}}

    /* Timer bar */
    .timer-row{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px;
    }
    .timer-label{font-size:11px;color:var(--gray);font-weight:700;letter-spacing:.5px}
    .timer-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:10px;margin:0 10px;overflow:hidden}
    .timer-bar-fill{
      height:100%; border-radius:10px;
      background:linear-gradient(90deg,var(--green),var(--gold));
      transition:width 1s linear;
    }
    .timer-sec{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--green);font-weight:700;min-width:30px;text-align:right}

    /* Previous prediction */
    .prev-pred{
      background:rgba(0,0,0,.2); border-radius:12px; padding:14px 16px;
      border:1px solid rgba(255,255,255,.07); text-align:center;
    }
    .prev-title{font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
    .prev-id{font-family:'Orbitron',sans-serif;font-size:10px;color:rgba(255,255,255,.4);margin-bottom:8px;word-break:break-all}
    .prev-text{font-size:13px;color:rgba(255,255,255,.75);line-height:1.75;font-style:italic}
    .prev-text strong{font-style:normal;font-weight:900}
    .prev-text .prev-dir-big  { color:var(--big-col);  font-weight:900; }
    .prev-text .prev-dir-small{ color:var(--gold);     font-weight:900; }

    /* ── BOTTOM NAV ── */
    .bottom-nav{
      position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); z-index:200;
      background:rgba(20,20,42,.97); backdrop-filter:blur(20px);
      border-top:1px solid rgba(245,197,24,.25); display:flex; align-items:stretch;
    }
    .nav-btn{
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:4px;
      background:none; border:none; cursor:pointer; color:var(--gray);
      font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; position:relative;
    }
    .nav-btn .ni{font-size:22px;line-height:1;transition:transform .2s}
    .nav-btn.active{color:var(--purple-d)}
    .nav-btn.active .ni{transform:translateY(-2px)}
    .nav-btn.active::after{
      content:''; position:absolute; top:0; left:15%; right:15%; height:2px;
      border-radius:0 0 4px 4px;
      background:linear-gradient(90deg,transparent,var(--purple-d),transparent);
    }

    @keyframes rv{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    .hidden{display:none!important}
  </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-txt">CHECKING VIP ACCESS...</div>
</div>

<div id="toast" class="toast hidden"></div>

<!-- HEADER -->
<header>
  <div class="hd-left">
    <div class="live-pill"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
  </div>
  <div class="hd-title">VIP Signal</div>
  <div class="hd-logo">
    <img src="https://raw.githubusercontent.com/akans47g/Lucky/main/logo.jpg" alt="Logo"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block';"/>
    <span class="lf">SP</span>
  </div>
</header>

<main>

  <!-- SUBSCRIPTION STATUS -->
  <div class="sub-status">
    <div class="ss-top">
      <div class="ss-badge"><div class="ss-dot"></div> VIP ACTIVE</div>
      <div class="ss-name" id="activePlanName">Loading...</div>
    </div>
    <div class="ss-countdown">
      <div class="ssc-box"><div class="ssc-num" id="ssDays">00</div><div class="ssc-lbl">Days</div></div>
      <div class="ssc-box"><div class="ssc-num" id="ssHrs">00</div><div class="ssc-lbl">Hrs</div></div>
      <div class="ssc-box"><div class="ssc-num" id="ssMin">00</div><div class="ssc-lbl">Min</div></div>
      <div class="ssc-box"><div class="ssc-num" id="ssSec">00</div><div class="ssc-lbl">Sec</div></div>
    </div>
  </div>

  <!-- PLATFORM URL -->
  <div class="platform-section">
    <div class="ps-title">🌐 Enter Your Trading Platform</div>
    <div class="ps-hint">Jis website par aap trading karte ho us ka URL dale (e.g. https://example.in)</div>
    <div class="url-input-row">
      <input class="url-input" type="url" id="platformUrl" placeholder="https://your-platform.com"/>
      <button class="url-submit-btn" onclick="submitPlatform()">Submit</button>
    </div>
    <div class="url-saved hidden" id="urlSavedBar">
      <span class="url-saved-text" id="urlSavedText"></span>
      <button class="url-change-btn" onclick="changePlatform()">Change</button>
    </div>
  </div>

  <!-- SIGNAL BOX -->
  <div id="signalSection">

    <div class="signal-outer" id="signalOuter">

      <!-- White inner card -->
      <div class="signal-inner">
        <div class="signal-word" id="signalWord">BIG</div>
        <div class="signal-id" id="signalId">20260522100011234</div>
      </div>

      <!-- Percentage -->
      <div class="signal-percent">
        <span class="pct-num" id="signalPct">76</span>% Chance Of
        <span id="signalDirText">Big</span>
      </div>

      <!-- Timer bar -->
      <div class="timer-row">
        <span class="timer-label">NEXT SIGNAL IN</span>
        <div class="timer-bar-wrap">
          <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
        </div>
        <span class="timer-sec" id="timerSec">60s</span>
      </div>

      <!-- Previous prediction -->
      <div class="prev-pred">
        <div class="prev-title">📋 Previous Prediction</div>
        <div class="prev-id" id="prevId"></div>
        <div class="prev-text" id="prevText"></div>
      </div>

    </div>

  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn" onclick="location.href='index.html'"><span class="ni">🏠</span>Home</button>
  <button class="nav-btn active"><span class="ni">💎</span>VIP Shot</button>
  <button class="nav-btn" onclick="location.href='proof.html'"><span class="ni">📊</span>Proof</button>
  <button class="nav-btn" onclick="location.href='account.html'"><span class="ni">👤</span>Account</button>
</nav>

<!-- ══ SIGNAL + SUBSCRIPTION LOGIC ══ -->
<script>
/* ─────────────────────────────────────────
   SEEDED RANDOM — same value for all users
   at the same minute
───────────────────────────────────────── */
function seededRand(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b) >>> 0;
  s = Math.imul(s ^ (s >>> 16), 0x45d9f3b) >>> 0;
  s = (s ^ (s >>> 16)) >>> 0;
  return s / 4294967296;
}

function getMinuteKey() {
  return Math.floor(Date.now() / 60000);
}

/* ─── Signal generation ─── */
function genSignal(mKey) {
  const dir = seededRand(mKey)           > 0.5 ? 'BIG' : 'SMALL';
  const pct = Math.floor(seededRand(mKey + 77777) * 26) + 60; // 60-85
  return { dir, pct };
}

function genId(mKey) {
  const d   = new Date();
  const dt  = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const ctr = String((mKey % 9000) + 1000); // always 4 digits 1000-9999
  return `${dt}10001${ctr}`;
}

function genPrevPct(mKey) {
  return Math.floor(seededRand(mKey - 1 + 99999) * 31) + 60; // 60-90
}

/* ─── Update UI ─── */
function updateSignal() {
  const mKey  = getMinuteKey();
  const cur   = genSignal(mKey);
  const prev  = genSignal(mKey - 1);
  const curId = genId(mKey);
  const preId = genId(mKey - 1);
  const prevPct = genPrevPct(mKey);

  /* Signal word */
  const wordEl = document.getElementById('signalWord');
  wordEl.textContent = cur.dir;
  wordEl.className   = `signal-word ${cur.dir}`;

  /* ID */
  document.getElementById('signalId').textContent = curId;

  /* Percentage */
  document.getElementById('signalPct').textContent     = cur.pct;
  document.getElementById('signalDirText').textContent  = cur.dir === 'BIG' ? 'Big' : 'Small';

  /* Previous prediction */
  document.getElementById('prevId').textContent = preId;
  const prevDirClass = prev.dir === 'BIG' ? 'prev-dir-big' : 'prev-dir-small';
  const prevDirOpp   = prev.dir === 'BIG' ? 'Big' : 'Small';
  document.getElementById('prevText').innerHTML =
    `I had mentioned <span class="${prevDirClass}">${prevDirOpp}</span><br>
     in the earlier production too,<br>
     And on <strong>${prevPct}%+</strong> platforms<br>
     it appeared as <span class="${prevDirClass}">${prevDirOpp}</span> only`;

  /* Flash effect */
  const outer = document.getElementById('signalOuter');
  outer.classList.add('flash');
  setTimeout(() => outer.classList.remove('flash'), 300);
}

/* ─── 1-minute countdown timer ─── */
let timerInterval = null;
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);

  function tick() {
    const secLeft = Math.ceil((60000 - (Date.now() % 60000)) / 1000);
    const pct     = (secLeft / 60) * 100;
    document.getElementById('timerSec').textContent = secLeft + 's';
    document.getElementById('timerBar').style.width  = pct + '%';

    /* Change signal at the minute boundary */
    if (secLeft === 60) {
      updateSignal();
    }
  }

  tick();
  timerInterval = setInterval(tick, 1000);
}

/* ─── Subscription countdown ─── */
let subInterval = null;
function startSubCountdown(expiresAt) {
  if (subInterval) clearInterval(subInterval);
  function tick() {
    const diff = expiresAt - Date.now();
    if (diff <= 0) {
      clearInterval(subInterval);
      // Expired — redirect to subs
      showToast('⚠️ Plan expire ho gaya! Renew karo.', 'warn');
      setTimeout(() => window.location.replace('subs.html'), 2000);
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000)  / 60000);
    const s = Math.floor((diff % 60000)    / 1000);
    document.getElementById('ssDays').textContent = String(d).padStart(2,'0');
    document.getElementById('ssHrs').textContent  = String(h).padStart(2,'0');
    document.getElementById('ssMin').textContent  = String(m).padStart(2,'0');
    document.getElementById('ssSec').textContent  = String(s).padStart(2,'0');
  }
  tick();
  subInterval = setInterval(tick, 1000);
}

/* ─── Platform URL ─── */
function submitPlatform() {
  const val = document.getElementById('platformUrl').value.trim();
  if (!val || (!val.startsWith('http://') && !val.startsWith('https://'))) {
    showToast('Valid URL dalo (https:// se shuru)','warn'); return;
  }
  localStorage.setItem('sp_platformUrl', val);
  showPlatformSaved(val);
  showSignalBox();
  showToast('✅ Platform URL save ho gaya!','success');
}

function showPlatformSaved(url) {
  document.getElementById('platformUrl').value    = url;
  document.getElementById('urlSavedText').textContent = url;
  document.getElementById('urlSavedBar').classList.remove('hidden');
  document.getElementById('platformUrl').parentElement.style.opacity = '0.5';
  document.getElementById('platformUrl').disabled = true;
  document.querySelector('.url-submit-btn').disabled = true;
}

function changePlatform() {
  localStorage.removeItem('sp_platformUrl');
  document.getElementById('urlSavedBar').classList.add('hidden');
  document.getElementById('platformUrl').value    = '';
  document.getElementById('platformUrl').disabled = false;
  document.querySelector('.url-submit-btn').disabled = false;
  document.getElementById('platformUrl').parentElement.style.opacity = '1';
  document.getElementById('signalSection').classList.remove('visible');
  document.getElementById('signalSection').style.display = 'none';
  if (timerInterval) clearInterval(timerInterval);
}

function showSignalBox() {
  const section = document.getElementById('signalSection');
  section.style.display = 'block';
  section.classList.add('visible');
  updateSignal();
  startTimer();
}

/* ─── Toast ─── */
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`;
  t.classList.remove('hidden'); void t.offsetWidth; t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.classList.add('hidden'),400); }, 3200);
}
</script>

<!-- ══ FIREBASE — Subscription Check ══ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDh_fzIv1_YLP6X8DzjFdXvvFQv2sciFzU",
  authDomain:        "lucky-b3886.firebaseapp.com",
  projectId:         "lucky-b3886",
  storageBucket:     "lucky-b3886.firebasestorage.app",
  messagingSenderId: "314352804588",
  appId:             "1:314352804588:web:96697e2668a95c19affbc9"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

function hideLoader() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function redirectToSubs() {
  window.location.replace('subs.html');
}

onAuthStateChanged(auth, async (user) => {

  /* Not logged in → login page */
  if (!user) {
    window.location.replace('login.html');
    return;
  }

  try {
    /* ── Firestore check ── */
    const snap     = await getDoc(doc(db, 'users', user.uid));
    const data     = snap.exists() ? snap.data() : {};
    const expires  = data.planExpiresAt;
    const now      = Date.now();

    let expiresMs  = 0;
    if (expires) {
      expiresMs = expires.toMillis ? expires.toMillis() : new Date(expires).getTime();
    }

    /* No active plan → subs page */
    if (!expiresMs || expiresMs <= now) {
      redirectToSubs();
      return;
    }

    /* ── Plan active — update localStorage + show UI ── */
    localStorage.setItem('sp_planExpires', expiresMs);
    localStorage.setItem('sp_planName',    data.planName || data.plan || 'VIP');
    localStorage.setItem('sp_coins',       data.coins    ?? 0);

    /* Show plan name */
    document.getElementById('activePlanName').textContent = data.planName || data.plan || 'VIP';

    /* Start subscription countdown */
    window.startSubCountdown(expiresMs);

    /* Hide loader */
    hideLoader();

    /* Check saved platform URL */
    const savedUrl = localStorage.getItem('sp_platformUrl');
    if (savedUrl) {
      window.showPlatformSaved(savedUrl);
      window.showSignalBox();
    }

  } catch (err) {
    console.error('VIP check error:', err);

    /* Fallback: use localStorage if Firebase fails */
    const localExpires = parseInt(localStorage.getItem('sp_planExpires') || '0');
    if (localExpires > Date.now()) {
      document.getElementById('activePlanName').textContent =
        localStorage.getItem('sp_planName') || 'VIP';
      window.startSubCountdown(localExpires);
      hideLoader();
      const savedUrl = localStorage.getItem('sp_platformUrl');
      if (savedUrl) { window.showPlatformSaved(savedUrl); window.showSignalBox(); }
    } else {
      redirectToSubs();
    }
  }
});

/* Expose functions to global scope for module access */
window.startSubCountdown = window.startSubCountdown; // already global via regular script
</script>
